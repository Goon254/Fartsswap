name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    name: build + lint + typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Lint (strict)
        run: npm run lint

      - name: Build (verifies migrations + worker compile to dist/)
        run: |
          npm run build
          test -d dist/database/migrations
          ls dist/database/migrations/*.js >/dev/null
          test -f dist/main.js
          test -f dist/worker.js

      - name: Unit tests
        run: npm test -- --watchman=false --ci

  audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Audit production dependencies (fail on high+)
        run: npm audit --omit=dev --audit-level=high

  e2e-tests:
    name: e2e (Postgres service)
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: farts
          POSTGRES_PASSWORD: farts
          POSTGRES_DB: farts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U farts -d farts"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: farts
      DATABASE_PASSWORD: farts
      DATABASE_NAME: farts
      DATABASE_RUN_MIGRATIONS: 'true'
      STORAGE_PROVIDER: local
      QUEUE_PROVIDER: memory
      APP_ROLE: api
      SESSION_COOKIE_SECRET: ci-secret-ci-secret-ci-secret-ci-secret-1234
      CORS_ALLOWED_ORIGINS: 'http://localhost:3000'
      RATE_LIMIT_MAX: '1000'
      RATE_LIMIT_WINDOW_SECONDS: '60'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: e2e tests
        run: npm run test:e2e

  image-scan:
    name: docker image build + Trivy scan + SBOM
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t farts-backend:ci ./backend

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: farts-backend:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (CycloneDX) for the image
        uses: anchore/sbom-action@v0
        with:
          image: farts-backend:ci
          format: cyclonedx-json
          output-file: backend-sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.cdx.json
